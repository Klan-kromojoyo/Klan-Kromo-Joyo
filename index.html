<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>Silsilah Relasi Sempurna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    color: #f5e6c8;

    background: 
        linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
        url("https://raw.githubusercontent.com/nguantukbanget84-sys/KOMIK/refs/heads/main/Batik.png");

    background-size: cover;        /* 🔥 ini kunci utama */
    background-position: center;   /* biar tetap fokus tengah */
    background-repeat: no-repeat;  /* jangan diulang */
    background-attachment: fixed; /* opsional (efek diam saat scroll) */
}
body {
    margin: 0;
    padding: 0;
}

/* Wrapper */
.wrapper {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

/* HEADER */
.header-box {
    text-align: center;
    padding: 20px;
    border-radius: 15px;
    background: linear-gradient(135deg, #3e2c1c, #6b4f2a);
    border: 2px solid #d4af37;
    box-shadow: 0 0 20px rgba(212,175,55,0.4);
}

.header-box h1 {
    color: #ffd700;
    margin: 0;
    letter-spacing: 2px;
}

/* Kata mutiara */
.quote {
    margin-top: 10px;
    font-style: italic;
    color: #e6c97a;
    font-size: 13px;
}

/* SEARCH */
#search {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 8px;
    border: 1px solid #d4af37;
    background: #1a120b;
    color: #f5e6c8;
}

/* CARD */
.card {
    background: linear-gradient(145deg, #2b1d0e, #1a120b);
    padding: 12px;
    border-radius: 10px;
    margin: 6px 0;
    border-left: 5px solid  #BA55D3;
    transition: 0.3s;
}

.card:hover {
    transform: translateX(5px);
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}
/* container tetap full */
.footer-box img {
    max-width: none;   /* 🔥 penting */
}
.footer-box {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    margin-top: 30px;
    text-align: center;
}
.footer-full {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
}

.footer-full img {
    width: 100%;
    display: block;
}

/* gambar diperkecil & center */
.footer-box img {
    width: 100%;
    max-height: 180px;   /* 🔥 ini yang mengecilkan */
    object-fit: contain; /* biar tidak gepeng */
    display: block;
    margin: auto; center
}

//* Container footer */
.footer-box {
    width: 100vw;                     /* full layar */
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;               /* keluar dari wrapper */
    margin-right: -50vw;
}

.footer-box img {
    width: 100%;
    height: auto;
    display: block;
}

/* Layer glow emas */
.footer-box::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    /* warna glow emas */
    background: radial-gradient(circle at center, 
        rgba(255,215,0,0.25),
        rgba(255,215,0,0.08),
        transparent 70%);

    mix-blend-mode: screen;
    animation: glowPulse 4s ease-in-out infinite;
    z-index: 2;
    pointer-events: none;
}

/* Animasi glow hidup */
@keyframes glowPulse {
    0% {
        opacity: 0.4;
        transform: scale(1);}
    50% {
        opacity: 0.8;
        transform: scale(1.05);
    }
    100% {
        opacity: 0.4;
        transform: scale(1);
    }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .header-box h1 {
        font-size: 16px;
    }

    .quote {
        font-size: 12px;
    }
}

.children {
    margin-left: 30px;
    border-left: 2px dashed #6b4f2a;
    display: none;
    padding-left: 10px;
}

.children.active {
    display: block;
}

.folder-icon::before { content: "👉 "; opacity: 0.8; }
.file-icon::before { content: "ꦲ "; opacity: 0.7; }

b { color: #ffd700; font-size: 15px; }
small { color: #c2a45c; }
.arrow { transition: transform 0.3s; color:  #BA55D3; font-size: 14px; }

#splash {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #1a120b;
    color: #ffd700;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    text-align: center;
    transition: opacity 1s ease;
}

#splash button {
    margin-top: 20px;
    padding: 12px 30px;
    background: #d4af37;
    color: #1a120b;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Times New Roman', serif;
}

#splash.fade-out {
    opacity: 0;
    pointer-events: none;
}

@media (max-width: 600px) {
    .card { flex-direction: column; align-items: flex-start; }
    .arrow { align-self: flex-end; }
    .children { margin-left: 15px; }
}
.popup {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0; top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
}

.popup-content {
    max-width: 90%;
    animation: zoomIn 0.5s ease;
}

.popup-content img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 0 20px gold;
}

.closeBtn {
    position: absolute;
    top: 20px;
    right: 30px;
    color: gold;
    font-size: 30px;
    cursor: pointer;
}

@keyframes zoomIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
/* Tombol mengambang oval */
.floating-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;

    padding: 12px 25px;
    border-radius: 50px;

    background: #5a3e1b;
    color: white;
    border: none;

    font-size: 14px;
    font-weight: bold;
    cursor: pointer;

    z-index: 9999;
    transition: all 0.3s ease;
}

/* hover */
.floating-btn:hover {
    transform: scale(1.05);
}

/* saat ditekan */
.floating-btn:active {
    background: linear-gradient(45deg, #FFD700, #FFC107, #FFEA00);
    color: black;

    box-shadow: 
        0 0 10px gold,
        0 0 20px gold,
        0 0 40px gold;

    transform: scale(0.95);
}
.header-full {
    width: 100vw;              /* full lebar layar */
    height: auto;
    display: block;

    /* keluar dari wrapper tengah */
    margin-left: calc(-50vw + 50%);

    /* biar tidak ada garis putih */
    max-width: none;
}
.judul-bawah {
    text-align: center;   /* center horizontal */
    width: 100%;          /* pastikan full lebar */
    margin-top: 40px;
    font-size: 20px;
    color: #d4af37;
}

    left: 20px;
    background: #00ff66;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: 0.3s;
}
</style>
</head>
<body>

    <html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Button</title>

</div>
  <img src="https://raw.githubusercontent.com/nguantukbanget84-sys/silsilah-audio/refs/heads/main/Header.png" class="header-full">
  <h1 id="judul"></h1>
<p id="mutiara"></p>
<div id="popupCerita" class="popup">
    <div class="popup-content">
        <span class="closeBtn">&times;</span>
        <img src="https://raw.githubusercontent.com/nguantukbanget84-sys/silsilah-audio/refs/heads/main/Cerita%20pendek.png" alt="Cerita Leluhur">
    </div>
</div>
<div id="splash">
    <h1>Sugeng Rawuh</h1>
    <p>Ing Silsilah Keluarga</p>
    <button id="btnMasuk">Mlebet</button>
</div>
<div class="wrapper">

    <!-- HEADER -->
    <header class="header-box">
        <h1>SILSILAH KELUARGA AGUNG</h1>
        <p class="quote">
            “Sapa sing ora ngerti asal-usule, bakal ilang arah lan tujuane.”
        </p>
    </header>

    <!-- KONTEN UTAMA -->
    <main>
        <input type="text" id="search" placeholder="Telusuri asmane...">
        <div id="app"></div>
    </main>
      <!-- Tombol -->
<button class="floating-btn" onclick="bukaLink()">LIHAT Cerita Bergambar</button>
 <div class="footer-full">
    <!-- FOOTER -->
    <footer class="footer-box">
        <img src="https://raw.githubusercontent.com/nguantukbanget84-sys/silsilah-audio/refs/heads/main/ChatGPT%20Image%2021%20Apr%202026%2C%2021.28.46.png" alt="Credit Pembuat">
        <p>© 2026 - Keluarga Rejo Semito</p>
    </footer>

</div>

<h2 class="judul-bawah">SANGKAN PARANING DUMADI</h2>

<audio id="bgMusic" loop>
    <source src="https://github.com/nguantukbanget84-sys/silsilah-audio/raw/refs/heads/main/Lelo%20ledung%20-%20Krisna%20Riswanto%20(cover)%20-%20Cipt.%20Markasan.mp3" type="audio/mpeg">
</audio>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7YcqOSbQGNgEkbo3z2j672k9MEtAHA5o",
  authDomain: "silsilah-keluarga-rejo-semito.firebaseapp.com",
  projectId: "silsilah-keluarga-rejo-semito",
  storageBucket: "silsilah-keluarga-rejo-semito.appspot.com",
  messagingSenderId: "850723357773",
  appId: "1:850723357773:web:6b3ed3bcc5f4252394c804"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getColor(level){
  const colors = ["#FFD700", "#E6C200", "#CFAF5B", "#B8963A", "#8B6F2F", "#6B4F2A", "#4A351C"];
  return colors[level - 1] || "#3a2a1a";
}

// Fungsi Toggle Folder
window.toggleFolder = function(element) {
  const childrenContainer = element.nextElementSibling;
  if (childrenContainer && childrenContainer.classList.contains('children')) {
    const isActive = childrenContainer.classList.toggle('active');
    const arrow = element.querySelector('.arrow');
    if(arrow) arrow.style.transform = isActive ? "rotate(180deg)" : "rotate(0deg)";
  }
};

onSnapshot(collection(db,"keluarga"),(snapshot)=>{
  let nodes = {};
  let roots = [];

  snapshot.forEach((docu) => {
    const data = docu.data();
    nodes[docu.id] = {
      id: docu.id,
      nama: data.nama,
      level: data.level || 1,
      parentId: data.parentId || null,
      pasangan: data.pasangan || "-",
      children: []
    };
  });

  Object.values(nodes).forEach(node => {
    if (node.parentId && nodes[node.parentId]) {
      nodes[node.parentId].children.push(node);
    } else {
      roots.push(node);
    }
  });

  function render(node) {
    const hasChildren = node.children.length > 0;
    const iconClass = hasChildren ? "folder-icon" : "file-icon";

    let html = `
      <div class="item-container">
        <div class="card ${iconClass}" 
             style="border-left-color:${getColor(node.level)}"
             onclick="toggleFolder(this)">
          <div>
            <b>${node.nama}</b><br>
            <small>Level ${node.level} • Pasangan: ${node.pasangan}</small>
          </div>
          <span class="arrow">${hasChildren ? "▼" : ""}</span>
        </div>
    `;

    if (hasChildren) {
      html += `<div class="children">`;
      node.children
        .sort((a, b) => a.nama.localeCompare(b.nama))
        .forEach(child => html += render(child));
      html += `</div>`;
    }

    html += `</div>`;
    return html;
  }

  let finalHTML = "";
  roots.sort((a,b)=>a.level - b.level).forEach(root => finalHTML += render(root));
  document.getElementById("app").innerHTML = finalHTML;
});

// Fitur Pencarian
document.getElementById("search").addEventListener("input", (e) => {
  let keyword = e.target.value.toLowerCase();
  document.querySelectorAll(".item-container").forEach(container => {
    const card = container.querySelector(".card");
    container.style.display = card.innerText.toLowerCase().includes(keyword) ? "block" : "none";
  });
});

// Kontrol Splash & Musik
document.getElementById("btnMasuk").addEventListener("click", () => {
    const splash = document.getElementById("splash");
    const music = document.getElementById("bgMusic");

    splash.classList.add("fade-out");
    music.play().catch(err => console.log("Musik tertunda:", err));

    setTimeout(() => { splash.style.display = "none"; }, 1000);
});
// buka popup
window.showCerita = function() {
    document.getElementById("popupCerita").style.display = "flex";
}

// tutup popup
document.querySelector(".closeBtn").onclick = function() {
    document.getElementById("popupCerita").style.display = "none";
}
window.addEventListener("click", function(e) {
    const text = e.target.innerText || "";

    // 🔥 GANTI NAMA DI SINI (yang mau muncul cerita)
    if (text.includes("Mbah PUTIH")) {
        document.getElementById("popupCerita").style.display = "flex";
    }
});

// tombol close
document.getElementById("closePopup").onclick = function() {
    document.getElementById("popupCerita").style.display = "none";
};

</script>
<script>
function bukaLink() {
    window.open("https://raw.githubusercontent.com/nguantukbanget84-sys/KOMIK/refs/heads/main/IMG_20260422_190852.png", "_blank");
}
</script>

</body>
</html>
